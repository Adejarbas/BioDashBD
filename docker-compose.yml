version: '3.8'

services:
  biodash-backend:
    image: danielrodriguesadejarbas/biodash-backend:latest
    build: .
    ports:
      - "80:3003"
    environment:
      - NODE_ENV=production
      # PostgreSQL RDS
      - POSTGRES_URL=postgresql://postgres:Biogen123!@database-1.cej6asnixj7d.us-east-1.rds.amazonaws.com:5432/postgres
      # JWT — mesmo segredo usado pelo Express backend
      - JWT_SECRET=biodash_jwt_secret_2024_change_in_production
      # URLs de acesso
      - NEXT_PUBLIC_SITE_URL=http://98.92.12.89
      - FRONTEND_URL=http://54.85.37.127
      - NEXT_PUBLIC_FRONTEND_URL=http://54.85.37.127
      - NEXT_PUBLIC_API_BASE_URL=http://98.92.12.89:3003
      # Supabase — mantidas para compatibilidade com partes ainda não migradas
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - biodash-network
    restart: unless-stopped

networks:
  biodash-network:
    driver: bridge